# Shared Claude PR reviewer — copy to .github/workflows/claude-review.yml in a
# project to adopt it (methodology ADR 0021).
#
# Prerequisites:
#   1. Install the Claude GitHub App on your account (one-time; covers every
#      repo at once). This is what POSTS the review — the API key alone is not
#      enough: https://github.com/apps/claude
#   2. Add an ANTHROPIC_API_KEY secret to THIS repo (the LLM credential):
#        gh secret set ANTHROPIC_API_KEY -R <owner>/<repo>
#   3. Allow the methodology repo's reusable workflows to be called from your
#      repos (one-time): Settings -> Actions -> General -> Access, or:
#        gh api -X PUT /repos/<owner>/methodology/actions/permissions/access \
#          -f access_level=user
#      NOTE: this only works within ONE account. A repo owned by a different
#      org/user cannot call this private reusable workflow — give that repo a
#      standalone copy of the workflow instead.
#
# Advisory only — keep your deterministic CI (lint/type/test) as the required
# merge gate.
name: Claude review

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    uses: vpciii/methodology/.github/workflows/claude-review.yml@main
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
    # Optional: use a deeper model for this repo's reviews
    # with:
    #   claude_args: "--model claude-opus-4-..."
